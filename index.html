<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Check-in EJC</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 10px; }
    #resultado { margin-top: 20px; padding: 20px; border-radius: 10px; font-size: 18px; display: none; }
    .ok { background: #d4edda; color: #155724; }
    .aviso { background: #fff3cd; color: #856404; }
    .erro { background: #f8d7da; color: #721c24; }
    #iniciarBtn {
      padding: 16px 32px; font-size: 18px; margin-top: 30px;
      border-radius: 8px; border: none; background: #4285f4; color: white;
    }
  </style>
</head>
<body>
  <h2>Check-in EJC</h2>

  <button id="iniciarBtn">📷 Iniciar Leitura</button>
  <div id="reader" style="width:100%; margin-top:20px;"></div>
  <div id="resultado"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx78rgHUib1pQFznNsi4W5TCdDgbyP3ZML5YgGJXddKd-Ru4zg0yXBoOTt6IccJ4D4fsA/exec";

    const resultadoDiv = document.getElementById("resultado");
    const iniciarBtn = document.getElementById("iniciarBtn");
    let processando = false;
    let scanner;

    iniciarBtn.addEventListener("click", () => {
      iniciarBtn.style.display = "none";
      scanner = new Html5Qrcode("reader");
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      ).catch(err => {
        resultadoDiv.style.display = "block";
        resultadoDiv.className = "erro";
        resultadoDiv.innerHTML = "❌ Não foi possível acessar a câmera: " + err;
      });
    });

    function onScanSuccess(codigo) {
      if (processando) return;
      processando = true;

      fetch(API_URL + "?codigo=" + encodeURIComponent(codigo))
        .then(res => res.json())
        .then(mostrarResultado)
        .catch(() => {
          resultadoDiv.style.display = "block";
          resultadoDiv.className = "erro";
          resultadoDiv.innerHTML = "❌ Erro de conexão. Tente novamente.";
          setTimeout(() => { resultadoDiv.style.display = "none"; processando = false; }, 3000);
        });
    }

    function mostrarResultado(res) {
      resultadoDiv.style.display = "block";
      if (res.status === "ok") {
        resultadoDiv.className = "ok";
        resultadoDiv.innerHTML = "✅ LIBERADO<br>" + res.nome + " - " + res.qtd + " hambúrguer(es)";
      } else if (res.status === "ja_retirado") {
        resultadoDiv.className = "aviso";
        resultadoDiv.innerHTML = "⚠️ JÁ RETIRADO<br>" + res.nome;
      } else if (res.status === "nao_pago") {
        resultadoDiv.className = "aviso";
        resultadoDiv.innerHTML = "⚠️ PAGAMENTO NÃO CONFIRMADO<br>" + res.nome;
      } else {
        resultadoDiv.className = "erro";
        resultadoDiv.innerHTML = "❌ CÓDIGO NÃO ENCONTRADO";
      }
      setTimeout(() => { resultadoDiv.style.display = "none"; processando = false; }, 3000);
    }
  </script>
</body>
</html>
